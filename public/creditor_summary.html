<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creditor Balance Summary</title>
    <script src="./style.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-bold text-slate-800">Creditor Balances</h1>
            <p class="text-slate-500 mt-2">Manage and track your pending credit amounts</p>
        </header>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </span>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none" 
                    placeholder="Search for a party name..."
                    onkeyup="filterTable()"
                >
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="px-6 py-4 text-xs font-semibold text-slate-600 uppercase tracking-wider">Party Name</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-600 uppercase tracking-wider text-right">Total Credit</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-600 uppercase tracking-wider text-right">Total Credit Return</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-600 uppercase tracking-wider text-right">Total Credit Return Bank</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-600 uppercase tracking-wider text-right">Pending Balance</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
            
            <div id="totalFooter" class="bg-slate-800 px-6 py-5 text-white flex justify-between items-center">
                <span class="font-medium text-slate-300">Total Pending Credit</span>
                <span id="grandTotal" class="text-xl font-bold">₹0.00</span>
            </div>
        </div>
    </div>

    <script>
    let allData = [];

    async function loadSummary() {
        try {
            const response = await fetch('/api/reports/creditor-summary');
            allData = await response.json();
            renderTable(allData);
        } catch (error) {
            console.error("Fetch error:", error);
            // Updated mock data to include totalDebitBank for testing
            allData = [
                { 
                    name: "Acme Corp", 
                    totalCredits: "5000.00", 
                    totalDebits: "1000.00", 
                    totalDebitBank: "500.00", 
                    pendingBalance: "3500.00" 
                },
                { 
                    name: "Global Logistics", 
                    totalCredits: "1000.00", 
                    totalDebits: "200.00", 
                    totalDebitBank: "1000.00", 
                    pendingBalance: "-200.00" 
                }
            ];
            renderTable(allData);
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        const totalDisplay = document.getElementById('grandTotal');
        tbody.innerHTML = '';
        let grandTotal = 0;

        data.forEach(item => {
            // Formula: totalCredit - totalDebit - totaldebitbank
            const balance = parseFloat(item.pendingBalance);
            grandTotal += balance;
            
            const balanceClass = balance > 0 ? 'text-red-600 bg-red-50' : 'text-emerald-600 bg-emerald-50';
            
            const row = `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="font-semibold text-slate-700">${item.name}</div>
                    </td>
                    <td class="px-6 py-4 text-right text-slate-600">₹${item.totalCredits}</td>
                    <td class="px-6 py-4 text-right text-slate-600">₹${item.totalDebits}</td>
                    <td class="px-6 py-4 text-right text-indigo-600 font-medium">₹${item.totalDebitBank || '0.00'}</td>
                    <td class="px-6 py-4 text-right">
                        <span class="inline-block px-3 py-1 rounded-full text-sm font-bold ${balanceClass}">
                            ₹${item.pendingBalance}
                        </span>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        totalDisplay.innerText = `₹${grandTotal.toFixed(2)}`;
    }

    function filterTable() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(item => item.name.toLowerCase().includes(term));
        renderTable(filtered);
    }

    document.addEventListener('DOMContentLoaded', loadSummary);
</script>

</body>
</html>
