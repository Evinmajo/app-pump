<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Creditors & Expenses</title>
    <script src="./style.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto space-y-8">
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-4">Add Creditor/Party</h2>
            <div class="flex gap-2 mb-6">
                <input type="text" id="partyName" class="flex-1 border p-2 rounded" placeholder="Enter Name">
                <button onclick="addEntry('partyName', '/api/parties')" class="bg-blue-600 text-white px-4 py-2 rounded">Add</button>
            </div>
            <ul id="partyList" class="space-y-2"></ul>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-4">Add Expense Name</h2>
            <div class="flex gap-2 mb-6">
                <input type="text" id="expenseName" class="flex-1 border p-2 rounded" placeholder="e.g., Electricity, Rent">
                <button onclick="addEntry('expenseName', '/api/expenses')" class="bg-red-600 text-white px-4 py-2 rounded">Add</button>
            </div>
            <ul id="expenseList" class="space-y-2"></ul>
        </div>
    </div>

    <script>
        // Fetches data for both lists from their respective endpoints
        async function fetchEntries() {
            try {
                // 1. Fetch and display Parties (Creditors)
                const partyRes = await fetch('/api/parties');
                const parties = await partyRes.json();
                const partyList = document.getElementById('partyList');
                partyList.innerHTML = parties.map(p => `
                    <li class="flex justify-between border-b py-2">
                        ${p.name}
                        <button onclick="deleteEntry('${p._id}', '/api/parties')" class="text-red-500 hover:font-bold">Delete</button>
                    </li>
                `).join('');

                // 2. Fetch and display Expenses
                const expenseRes = await fetch('/api/expenses');
                const expenses = await expenseRes.json();
                const expenseList = document.getElementById('expenseList');
                expenseList.innerHTML = expenses.map(e => `
                    <li class="flex justify-between border-b py-2">
                        ${e.name}
                        <button onclick="deleteEntry('${e._id}', '/api/expenses')" class="text-red-500 text-sm hover:font-bold">Delete</button>
                    </li>
                `).join('');
            } catch (err) {
                console.error("Error loading data:", err);
            }
        }

        // Adds a new entry to the specified endpoint
        async function addEntry(inputId, url) {
            const nameInput = document.getElementById(inputId);
            const name = nameInput.value.trim();
            if (!name) return;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name })
                });
                
                if (response.ok) {
                    nameInput.value = '';
                    fetchEntries();
                } else {
                    alert("Error adding entry. Name might already exist.");
                }
            } catch (err) {
                console.error("Post error:", err);
            }
        }

        // Deletes an entry from the specified endpoint
        async function deleteEntry(id, url) {
            if (!confirm("Are you sure you want to delete this?")) return;
            
            try {
                await fetch(`${url}/${id}`, { method: 'DELETE' });
                fetchEntries();
            } catch (err) {
                console.error("Delete error:", err);
            }
        }

        // Initial load on page visit
        fetchEntries();
    </script>
</body>
</html>
