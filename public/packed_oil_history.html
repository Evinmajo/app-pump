<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packed Oil Sales History</title>
    <script src="./style.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Packed Oil Sales History</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">From Date</label>
                <input type="date" id="fromDate" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">To Date</label>
                <input type="date" id="toDate" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div class="flex items-end">
                <button onclick="fetchHistory()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition">
                    Fetch History
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 border-t pt-6">
            <div class="md:col-span-3">
                <input type="text" id="searchInput" placeholder="Search by Oil Type (e.g. Sunflower)..." 
                class="block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button onclick="filterTable()" class="bg-gray-800 hover:bg-black text-white font-bold py-2 px-4 rounded-md transition">
                Filter Items
            </button>
        </div>

        <div class="overflow-x-auto">
            <table class="min-w-full table-auto border-collapse">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 border-b text-left text-xs font-semibold text-gray-600 uppercase">Date</th>
                        <th class="px-4 py-3 border-b text-left text-xs font-semibold text-gray-600 uppercase">Oil Type</th>
                        <th class="px-4 py-3 border-b text-center text-xs font-semibold text-gray-600 uppercase">Qty Sold</th>
                        <th class="px-4 py-3 border-b text-center text-xs font-semibold text-gray-600 uppercase">Total Price</th>
                        <th class="px-4 py-3 border-b text-left text-xs font-semibold text-gray-600 uppercase">Staff</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody" class="divide-y divide-gray-200">
                    </tbody>
                <tfoot id="historyTableFoot" class="bg-gray-100 font-bold hidden">
                    <tr>
                        <td colspan="2" class="px-4 py-3 text-right text-sm text-gray-700 uppercase">Grand Total:</td>
                        <td id="totalQty" class="px-4 py-3 text-center text-sm text-gray-900">0</td>
                        <td id="totalPrice" class="px-4 py-3 text-center text-sm text-gray-900">₹0</td>
                        <td></td> 
                    </tr>
                </tfoot>    
            </table>
        </div>
        <div id="noDataMessage" class="hidden text-center py-10 text-gray-500">No sales records found for this period.</div>
    </div>

    <script>
        let allData = []; // Global storage for filtering

        async function fetchHistory() {
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            
            try {
                // Fetching from your API
                const response = await fetch(`/api/transactions/packedOil?fromDate=${fromDate}&toDate=${toDate}`);
                allData = await response.json(); 

                // Reset search input when fetching new date range
                document.getElementById('searchInput').value = '';
                
                renderTable(allData); 
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to load history.');
            }
        }

        // The onclick search function
        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            // Filter the existing data array
            const filteredResults = allData.filter(item => 
                item.name.toLowerCase().includes(searchTerm)
            );
            
            renderTable(filteredResults);
        }

        // Helper to draw the table and update totals
        function renderTable(data) {
            const tbody = document.getElementById('historyTableBody');
            const tfoot = document.getElementById('historyTableFoot');
            const noData = document.getElementById('noDataMessage');

            tbody.innerHTML = '';
            
            if (data.length === 0) {
                noData.classList.remove('hidden');
                tfoot.classList.add('hidden');
                return;
            }

            noData.classList.add('hidden');
            tfoot.classList.remove('hidden');
            
            let grandTotalQty = 0;
            let grandTotalPrice = 0;

            data.forEach(item => {
                grandTotalQty += Number(item.quantity) || 0;
                grandTotalPrice += Number(item.price) || 0;
                
                const row = `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-700">${item.date}</td>
                        <td class="px-4 py-4 whitespace-nowrap text-sm font-semibold text-blue-600">${item.name}</td>
                        <td class="px-4 py-4 whitespace-nowrap text-sm text-center text-gray-700">${item.quantity}</td>
                        <td class="px-4 py-4 whitespace-nowrap text-sm text-center text-gray-700">₹${item.price}</td>
                        <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">${item.staffName}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            document.getElementById('totalQty').innerText = grandTotalQty;
            document.getElementById('totalPrice').innerText = `₹${grandTotalPrice.toLocaleString()}`;
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('fromDate').value = today;
            document.getElementById('toDate').value = today;
            fetchHistory();
        };
    </script>
</body>
</html>
